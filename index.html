<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Myu Music MBTI</title>
    <meta
      name="description"
      content="音楽の感性からタイプを診断する Myu の音楽MBTI診断ツール"
    />
    <script>
      (function () {
        var repoBase = "/shindan";
        var params = new URLSearchParams(window.location.search);
        var path = params.get("p");
        if (!path) return;

        var query = params.get("q");
        var hash = params.get("h");
        var nextUrl =
          repoBase +
          path +
          (query ? "?" + query : "") +
          (hash ? "#" + hash : "");

        window.history.replaceState(null, "", nextUrl);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
